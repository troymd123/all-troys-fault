<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — All Troy's Fault</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="admin-shell">

  <!-- LOGIN -->
  <div class="admin-login" id="loginView">
    <h1>Band Login</h1>
    <p>Manage shows, videos, and merch.</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;">Enter</button>
      <div class="form-status err" id="loginError"></div>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" style="display:none;">
    <div class="admin-header">
      <h1>Band Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="events">Shows</button>
      <button class="tab-btn" data-tab="videos">Videos</button>
      <button class="tab-btn" data-tab="merch">Merch</button>
    </div>

    <!-- EVENTS -->
    <div class="admin-panel active" id="panel-events">
      <form class="admin-form" id="eventForm">
        <div class="field">
          <label for="ev-venue">Venue</label>
          <input id="ev-venue" name="venue" type="text" required>
        </div>
        <div class="field">
          <label for="ev-location">City / location</label>
          <input id="ev-location" name="location" type="text">
        </div>
        <div class="field">
          <label for="ev-date">Date</label>
          <input id="ev-date" name="date" type="date" required>
        </div>
        <div class="field">
          <label for="ev-time">Time</label>
          <input id="ev-time" name="time" type="time">
        </div>
        <div class="field full">
          <label for="ev-ticket">Ticket / event link (optional)</label>
          <input id="ev-ticket" name="ticketUrl" type="url" placeholder="https://">
        </div>
        <div class="field full">
          <label for="ev-notes">Notes (optional)</label>
          <input id="ev-notes" name="notes" type="text" placeholder="e.g. Acoustic set, private event, 21+">
        </div>
        <div class="full form-actions">
          <button class="btn btn-primary" type="submit">Add show</button>
          <button class="btn btn-outline" type="button" id="eventCancelEdit">Cancel edit</button>
        </div>
      </form>
      <div class="admin-list" id="eventList"></div>
    </div>

    <!-- VIDEOS -->
    <div class="admin-panel" id="panel-videos">
      <form class="admin-form" id="videoForm">
        <div class="field full">
          <label for="vid-title">Title</label>
          <input id="vid-title" name="title" type="text" placeholder="e.g. Live at The Yellow Rose">
        </div>
        <div class="field full">
          <label for="vid-url">Video link (YouTube, Instagram, TikTok)</label>
          <input id="vid-url" name="url" type="url" required placeholder="https://">
        </div>
        <div class="full form-actions">
          <button class="btn btn-primary" type="submit">Add video</button>
        </div>
      </form>
      <div class="admin-list" id="videoList"></div>
    </div>

    <!-- MERCH -->
    <div class="admin-panel" id="panel-merch">
      <form class="admin-form" id="merchForm">
        <div class="field">
          <label for="mer-title">Item title</label>
          <input id="mer-title" name="title" type="text" required placeholder="e.g. Outlaw Tee">
        </div>
        <div class="field">
          <label for="mer-store">Store name</label>
          <input id="mer-store" name="storeName" type="text" required placeholder="e.g. Bonfire">
        </div>
        <div class="field full">
          <label for="mer-storeurl">Store / product link</label>
          <input id="mer-storeurl" name="storeUrl" type="url" required placeholder="https://www.bonfire.com/...">
        </div>
        <div class="field">
          <label for="mer-file">Upload design image</label>
          <input id="mer-file" name="imageFile" type="file" accept="image/*">
          <div class="file-hint">Or paste an image URL instead →</div>
        </div>
        <div class="field">
          <label for="mer-imageurl">Image URL (optional)</label>
          <input id="mer-imageurl" name="imageUrl" type="url" placeholder="https://">
        </div>
        <div class="full form-actions">
          <button class="btn btn-primary" type="submit">Add item</button>
        </div>
      </form>
      <div class="admin-list" id="merchList"></div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
